<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="GaziGPT - Ücretsiz ve sınırsız AI asistanı">
    <title>GaziGPT</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="app-container" id="appContainer">

        <!-- ===== SIDEBAR ===== -->
        <div class="sidebar-overlay" id="sidebarOverlay"></div>
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <button class="new-chat-btn" id="newChatBtn" title="Yeni Sohbet (Ctrl+N)">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    <span>Yeni Sohbet</span>
                </button>
                <button class="sidebar-close-btn" id="closeSidebar" title="Paneli Kapat">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>

            <div class="sidebar-search">
                <div class="search-box">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input type="text" id="searchChats" placeholder="Sohbet ara...">
                </div>
            </div>

            <div class="chat-list" id="chatList"></div>

            <div class="sidebar-footer">
                <button class="sidebar-footer-btn" id="settingsBtn" title="Ayarlar">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
                    <span>Ayarlar</span>
                </button>
            </div>
        </aside>

        <!-- ===== MAIN CONTENT ===== -->
        <main class="main-content" id="mainContent">
            <button class="toggle-sidebar" id="toggleSidebar">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>

            <!-- Empty State -->
            <div class="empty-state" id="emptyState">
                <div class="empty-logo">
                    <div class="logo-glow"></div>
                    <div class="logo-icon">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="url(#logoGrad)" stroke-width="1.5">
                            <defs><linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#a78bfa"/><stop offset="50%" style="stop-color:#818cf8"/><stop offset="100%" style="stop-color:#6366f1"/></linearGradient></defs>
                            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                        </svg>
                    </div>
                </div>
                <h1 class="empty-title">GaziGPT</h1>
                <p class="empty-subtitle">Araçlarla güçlendirilmiş, sınırsız AI asistanı</p>
                <div class="feature-cards">
                    <div class="feature-card" onclick="setQuickPrompt('Bugün İstanbul hava durumu nasıl?')">
                        <span class="feature-icon">🌤️</span>
                        <span class="feature-text">Hava durumu sor</span>
                    </div>
                    <div class="feature-card" onclick="setQuickPrompt('Hello World cümlesini İngilizce\'den Japonca\'ya çevir')">
                        <span class="feature-icon">🌐</span>
                        <span class="feature-text">Metin çevir</span>
                    </div>
                    <div class="feature-card" onclick="setQuickPrompt('1 USD kaç TRY?')">
                        <span class="feature-icon">💱</span>
                        <span class="feature-text">Döviz kuru sorgula</span>
                    </div>
                    <div class="feature-card" onclick="setQuickPrompt('Yapay zeka nedir? Wikipedia\'dan araştır')">
                        <span class="feature-icon">📚</span>
                        <span class="feature-text">Wikipedia araması</span>
                    </div>
                    <div class="feature-card" onclick="setQuickPrompt('https://example.com sayfasının içeriğini oku')">
                        <span class="feature-icon">📄</span>
                        <span class="feature-text">Web sayfası oku</span>
                    </div>
                    <!-- Dosya ekleme kartı kaldırıldı -->
                </div>
            </div>

            <!-- Chat Messages -->
            <div class="chat-messages" id="chatMessages" style="display:none;"></div>

            <!-- Input Area -->
            <div class="input-area" id="inputArea">
                <div class="input-container">
                    <div class="input-wrapper">
                        <!-- Attach butonu kaldırıldı -->
                        <textarea id="messageInput" placeholder="Mesajınızı yazın... (Shift+Enter yeni satır)" rows="1"></textarea>
                        <button class="send-btn" id="sendBtn" title="Gönder">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                        </button>
                        <button class="stop-btn" id="stopBtn" title="Yanıtı Durdur" style="display:none;">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
                        </button>
                    </div>
                    <!-- File Preview kaldırıldı -->
                    <div class="input-footer">
                        <span class="char-count" id="charCount">0</span>
                        <span class="input-hint">GaziGPT gerektiğinde araçları otomatik kullanır</span>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- ===== MODAL: Silme Onayı ===== -->
    <div class="modal-overlay" id="deleteModal">
        <div class="modal-content">
            <div class="modal-icon">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
            </div>
            <h3 class="modal-title">Sohbeti Sil</h3>
            <p class="modal-text">Bu sohbet kalıcı olarak silinecek. Devam etmek istiyor musun?</p>
            <div class="modal-actions">
                <button class="modal-btn modal-btn-cancel" id="cancelDelete">İptal</button>
                <button class="modal-btn modal-btn-delete" id="confirmDelete">Sil</button>
            </div>
        </div>
    </div>

    <!-- ===== MODAL: Ayarlar ===== -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h3 class="modal-title">⚙️ Ayarlar</h3>
                <button class="modal-close" id="closeSettings">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <div class="settings-body">
                <div class="settings-group">
                    <label class="settings-label">Yazı Boyutu: <span id="fontSizeValue">14</span>px</label>
                    <input type="range" id="settingsFontSize" class="settings-range" min="12" max="20" value="14">
                </div>
                <div class="settings-group settings-toggle-group">
                    <label class="settings-label">Enter ile Gönder</label>
                    <label class="toggle-switch">
                        <input type="checkbox" id="settingsEnterSend" checked>
                        <span class="toggle-slider"></span>
                    </label>
                </div>
                <div class="settings-group">
                    <button class="settings-save-btn" id="saveSettingsBtn">Kaydet</button>
                </div>
                <div class="settings-group settings-danger-zone">
                    <label class="settings-label" style="color:var(--danger)">Tehlikeli Bölge</label>
                    <button class="settings-danger-btn" id="clearAllChatsBtn">Tüm Sohbetleri Sil</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
